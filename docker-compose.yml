version: '3.8'

services:
  invoice-service:
    build:
      context: .
      dockerfile: ./src/invoices/Dockerfile
    container_name: invoice-service
    ports:
      - '3000:3000'
    environment:
      - MONGO_URL=mongodb://mongo:27017/invoice_service
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  report-service:
    build:
      context: .
      dockerfile: ./src/report/Dockerfile
    container_name: report-service
    ports:
      - '3001:3000'
    environment:
      - MONGO_URL=mongodb://mongo:27017/invoice_service
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  email-service:
    build:
      context: .
      dockerfile: ./src/email/Dockerfile
    container_name: email-service
    ports:
      - '3002:3000'
    environment:
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  mongo:
    image: mongo
    container_name: mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.stats()' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD', 'rabbitmqctl', 'status']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  mongodb_data:
    name: mongodb_data

networks:
  app-network:
